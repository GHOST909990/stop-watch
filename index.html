<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Таймер</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <style>
        *,
        *:before,
        *:after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: #448fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            padding: 10px;
        }

        .container {
            background-color: #fff;
            width: 100%;
            max-width: 600px;
            padding: 20px 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .timerDisplay {
            width: 100%;
            background: #fff;
            padding: 30px 10px;
            font-family: 'Roboto mono', monospace;
            color: #0381bb;
            font-size: clamp(1.5rem, 8vw, 3rem);
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 139, 253, 0.25);
            margin-bottom: 30px;
            word-break: break-word;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .buttons button {
            flex: 1 1 auto;
            min-width: 120px;
            padding: 15px 10px;
            background-color: #205e94;
            color: #fff;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-size: clamp(0.9rem, 4vw, 1.2rem);
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            transition: opacity 0.2s;
        }

        .buttons button:active {
            opacity: 0.7;
        }

        .buttons button:nth-last-child(2) {
            background-color: #d23332;
        }

        .buttons button:nth-last-child(1) {
            background-color: #20b380;
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 480px) {
            .container {
                padding: 15px 10px;
            }

            .timerDisplay {
                padding: 20px 5px;
                font-size: clamp(1.2rem, 6vw, 2rem);
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .buttons button {
                width: 100%;
                padding: 12px;
                font-size: 1rem;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 320px) {
            .timerDisplay {
                font-size: 1rem;
            }

            .buttons button {
                padding: 10px;
                font-size: 0.9rem;
            }
        }

        /* Альбомная ориентация */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 5px;
            }

            .container {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .timerDisplay {
                margin-bottom: 0;
                padding: 15px;
            }

            .buttons {
                flex-direction: row;
            }

            .buttons button {
                padding: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="timerDisplay">
            00 : 00 : 00 : 000
        </div>

        <div class="buttons">
            <button class="pauseTimer">Пауза</button>
            <button class="startTimer">Старт</button>
            <button class="resetTimer">Сброс</button>
        </div>
    </div>

    <script>
        let [milliseconds, seconds, minutes, hours] = [0, 0, 0, 0];
        let timerRef = document.querySelector('.timerDisplay');
        let int = null;

        document.querySelector('.startTimer').addEventListener('click', () => {
            if (int !== null) {
                clearInterval(int);
            }
            int = setInterval(displayTimer, 10);
        });

        document.querySelector('.pauseTimer').addEventListener('click', () => {
            clearInterval(int);
        });

        document.querySelector('.resetTimer').addEventListener('click', () => {
            clearInterval(int);
            [milliseconds, seconds, minutes, hours] = [0, 0, 0, 0];
            timerRef.innerHTML = '00 : 00 : 00 : 000';
        });

        function displayTimer() {
            milliseconds += 10;
            if (milliseconds >= 1000) {
                milliseconds = 0;
                seconds++;
                if (seconds == 60) {
                    seconds = 0;
                    minutes++;
                    if (minutes == 60) {
                        minutes = 0;
                        hours++;
                    }
                }
            }

            let h = hours < 10 ? "0" + hours : hours;
            let m = minutes < 10 ? "0" + minutes : minutes;
            let s = seconds < 10 ? "0" + seconds : seconds;
            let ms = milliseconds < 10 ? "00" + milliseconds : milliseconds < 100 ? "0" + milliseconds : milliseconds;

            timerRef.innerHTML = `${h} : ${m} : ${s} : ${ms}`;
        }
    </script>
</body>

</html>
